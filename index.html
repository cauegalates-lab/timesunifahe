<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Painel de Performance Comercial</title>
  <style>
    :root {
      --bg: #010711;
      --surface: #061426;
      --surface-2: #081a30;
      --surface-3: #0a2038;
      --cyan: #19c9ff;
      --cyan-2: #67dcff;
      --cyan-soft: rgba(25, 201, 255, .24);
      --orange: #ff7600;
      --orange-2: #ff9a38;
      --orange-soft: rgba(255, 118, 0, .24);
      --white: #f4f8ff;
      --muted: #88adc5;
      --line: rgba(93, 203, 255, .42);
      --danger: #ff4d4d;
      --success: #2ef2aa;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% -8%, rgba(0, 151, 232, .17), transparent 35%),
        radial-gradient(circle at 10% 90%, rgba(255, 118, 0, .07), transparent 30%),
        linear-gradient(180deg, #020812 0%, #00040a 100%);
      color: var(--white);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      overflow: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .23;
      background-image:
        linear-gradient(rgba(25, 201, 255, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(25, 201, 255, .055) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(to bottom, transparent 0, #000 18%, #000 82%, transparent 100%);
    }

    button { font: inherit; }

    .shell {
      position: relative;
      width: min(98vw, 1800px);
      min-width: 1180px;
      aspect-ratio: 2 / 1;
      min-height: 590px;
      padding: 20px;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(135deg, rgba(8, 28, 50, .97), rgba(1, 7, 16, .99)),
        var(--bg);
      border: 1px solid rgba(35, 199, 255, .76);
      clip-path: polygon(2% 0, 98% 0, 100% 4%, 100% 96%, 98% 100%, 2% 100%, 0 96%, 0 4%);
      box-shadow:
        0 0 30px rgba(0, 158, 235, .2),
        inset 0 0 55px rgba(0, 126, 201, .08);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 9px;
      z-index: 0;
      pointer-events: none;
      border: 1px solid rgba(25, 201, 255, .22);
      clip-path: inherit;
    }

    .shell::after {
      content: "";
      position: absolute;
      z-index: 4;
      top: 8px;
      left: 8%;
      right: 8%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent 22%, var(--orange), transparent 50%, var(--cyan), transparent 78%, var(--orange), transparent);
      box-shadow: 0 0 15px var(--cyan-soft), 0 0 18px var(--orange-soft);
      pointer-events: none;
    }

    .decor-corner {
      position: absolute;
      width: 76px;
      height: 76px;
      z-index: 5;
      pointer-events: none;
    }

    .decor-corner::before,
    .decor-corner::after {
      content: "";
      position: absolute;
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange), 0 0 20px var(--orange-soft);
    }

    .decor-corner::before { width: 54px; height: 2px; }
    .decor-corner::after { width: 2px; height: 54px; }
    .decor-corner.tl { top: 18px; left: 22px; }
    .decor-corner.tr { top: 18px; right: 22px; transform: scaleX(-1); }
    .decor-corner.bl { bottom: 18px; left: 22px; transform: scaleY(-1); }
    .decor-corner.br { bottom: 18px; right: 22px; transform: scale(-1); }

    .layout {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr);
      gap: 12px;
    }

    .topbar {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(300px, 1fr) auto minmax(260px, .78fr);
      align-items: center;
      gap: 18px;
      padding: 8px 18px;
      background:
        linear-gradient(180deg, rgba(10, 32, 55, .97), rgba(3, 15, 29, .98));
      border: 1px solid rgba(91, 205, 255, .55);
      clip-path: polygon(1.2% 0, 98.8% 0, 100% 28%, 100% 72%, 98.8% 100%, 1.2% 100%, 0 72%, 0 28%);
      box-shadow: inset 0 0 24px rgba(25, 201, 255, .07), 0 0 14px rgba(0, 157, 228, .08);
    }

    .titulo-bloco { min-width: 0; }

    .eyebrow {
      color: var(--cyan-2);
      font-size: clamp(9px, .65vw, 12px);
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .titulo-principal {
      margin: 0;
      color: var(--white);
      font-size: clamp(18px, 1.35vw, 28px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: .045em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .titulo-principal b { color: var(--orange); }

    .semanas {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .semana-btn {
      position: relative;
      min-width: 96px;
      height: 38px;
      padding: 0 12px;
      color: #9fc8de;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .055em;
      text-transform: uppercase;
      cursor: pointer;
      background: rgba(4, 18, 33, .9);
      border: 1px solid rgba(78, 184, 234, .38);
      clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
      transition: color .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .semana-btn:hover {
      color: var(--white);
      border-color: var(--cyan);
      box-shadow: inset 0 0 16px rgba(25, 201, 255, .08), 0 0 12px rgba(25, 201, 255, .12);
      transform: translateY(-1px);
    }

    .semana-btn.active {
      color: #fff;
      border-color: var(--orange);
      background: linear-gradient(180deg, rgba(255, 118, 0, .2), rgba(72, 28, 0, .18));
      box-shadow: inset 0 0 17px rgba(255, 118, 0, .14), 0 0 13px rgba(255, 118, 0, .18);
    }

    .semana-btn.active::after {
      content: "";
      position: absolute;
      left: 20%;
      right: 20%;
      bottom: 2px;
      height: 2px;
      background: var(--orange);
      box-shadow: 0 0 9px var(--orange);
    }

    .semana-btn[data-filtro="mes"] {
      min-width: 82px;
      color: var(--cyan-2);
      border-color: rgba(25, 201, 255, .58);
    }

    .semana-btn[data-filtro="mes"].active {
      color: #fff;
      border-color: var(--orange);
    }

    .status-area {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      text-align: right;
    }

    .periodo-wrap { min-width: 0; }

    .periodo {
      color: var(--white);
      font-size: clamp(11px, .76vw, 14px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .ultima-atualizacao {
      margin-top: 3px;
      color: var(--muted);
      font-size: clamp(9px, .62vw, 11px);
      font-weight: 650;
      white-space: nowrap;
    }

    .live-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 31px;
      padding: 0 10px;
      color: #9fc8de;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .09em;
      text-transform: uppercase;
      border: 1px solid rgba(82, 188, 237, .34);
      background: rgba(3, 15, 29, .86);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 11px var(--success);
      animation: pulse 1.7s ease-in-out infinite;
    }

    .live-badge.demo .live-dot {
      background: var(--orange);
      box-shadow: 0 0 11px var(--orange);
    }

    .live-badge.error .live-dot {
      background: var(--danger);
      box-shadow: 0 0 11px var(--danger);
    }

    @keyframes pulse {
      0%, 100% { opacity: .45; transform: scale(.78); }
      50% { opacity: 1; transform: scale(1.18); }
    }

    .painel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 11px;
    }

    .card {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(0, 167, 247, .07), transparent 33%),
        linear-gradient(180deg, rgba(8, 28, 49, .97), rgba(3, 14, 27, .99));
      border: 1px solid rgba(101, 208, 255, .55);
      clip-path: polygon(3.5% 0, 96.5% 0, 100% 9%, 100% 91%, 96.5% 100%, 3.5% 100%, 0 91%, 0 9%);
      box-shadow: inset 0 0 25px rgba(25, 201, 255, .065), 0 0 13px rgba(0, 145, 220, .07);
    }

    .card::before {
      content: "";
      position: absolute;
      z-index: 4;
      top: 6px;
      left: 13%;
      right: 13%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(25, 201, 255, .8), transparent);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .48;
      background:
        linear-gradient(90deg, transparent 0 3%, rgba(25, 201, 255, .055) 3% 3.25%, transparent 3.25% 96.75%, rgba(25, 201, 255, .055) 96.75% 97%, transparent 97% 100%);
    }

    .equipe-card {
      display: grid;
      grid-template-rows: minmax(0, 1.32fr) minmax(0, .72fr);
    }

    .equipe-topo {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 27% minmax(0, 73%);
      align-items: center;
      gap: 9px;
      padding: 8px 14px 7px 8px;
      border-bottom: 1px solid rgba(89, 191, 238, .34);
    }

    .logo-frame {
      position: relative;
      justify-self: center;
      width: min(92%, 115px);
      aspect-ratio: 1.13 / 1;
      padding: 4px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(150deg, rgba(12, 38, 65, .94), rgba(2, 12, 24, .99));
      border: 1px solid rgba(255, 118, 0, .8);
      clip-path: polygon(16% 0, 84% 0, 100% 20%, 100% 80%, 84% 100%, 16% 100%, 0 80%, 0 20%);
      box-shadow: 0 0 13px rgba(255, 118, 0, .16), inset 0 0 15px rgba(25, 201, 255, .1);
    }

    .logo-frame::before {
      content: "";
      position: absolute;
      inset: 5px;
      z-index: 0;
      border: 1px solid rgba(25, 201, 255, .28);
      clip-path: inherit;
    }

    .logo-frame img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      filter: saturate(1.03) contrast(1.04) drop-shadow(0 0 6px rgba(255, 118, 0, .16));
    }

    .integrantes {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: clamp(1px, .13vw, 3px);
      padding-right: 10px;
    }

    .integrante {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(96px, 31%);
      align-items: baseline;
      column-gap: 13px;
      font-size: clamp(12px, .89vw, 17px);
      line-height: 1.03;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .nome {
      min-width: 0;
      overflow: hidden;
      color: var(--white);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .integrante:first-child .nome {
      color: var(--orange-2);
      text-shadow: 0 0 9px rgba(255, 118, 0, .18);
    }

    .valor-integrante {
      min-width: 0;
      color: var(--white);
      text-align: right;
      white-space: nowrap;
      letter-spacing: .01em;
    }

    .valor-integrante.loading {
      color: transparent;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,.05), rgba(255,255,255,.13), rgba(255,255,255,.05));
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .equipe-kpis {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1.17fr;
      padding: 6px 9px 7px;
      background: linear-gradient(180deg, rgba(5, 21, 38, .97), rgba(2, 12, 24, .99));
    }

    .kpi {
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1px 7px;
    }

    .kpi + .kpi::before {
      content: "";
      position: absolute;
      left: 0;
      top: 13%;
      bottom: 13%;
      width: 1px;
      background: linear-gradient(transparent, rgba(25, 201, 255, .43), transparent);
    }

    .kpi-label {
      margin-bottom: 4px;
      color: #8cddff;
      font-size: clamp(8px, .67vw, 12px);
      font-weight: 900;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .kpi-valor {
      color: var(--white);
      font-size: clamp(13px, 1.13vw, 22px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.015em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .kpi-valor.meta { color: var(--orange); }

    .percentual {
      color: var(--orange);
      font-size: clamp(27px, 2.42vw, 47px);
      line-height: .9;
      font-weight: 950;
      letter-spacing: -.035em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 14px rgba(255, 118, 0, .23);
    }

    .marca-card {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(0, 176, 255, .105), transparent 50%),
        linear-gradient(180deg, rgba(7, 25, 44, .98), rgba(2, 12, 23, .99));
    }

    .hud {
      position: relative;
      width: 76%;
      height: 74%;
      display: grid;
      place-items: center;
    }

    .hud::before,
    .hud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(25, 201, 255, .42);
      box-shadow: 0 0 13px rgba(25, 201, 255, .08), inset 0 0 12px rgba(25, 201, 255, .06);
    }

    .hud::before { width: 47%; aspect-ratio: 1; }
    .hud::after { width: 34%; aspect-ratio: 1; border-style: dashed; }

    .hud-ring {
      position: absolute;
      width: 58%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(from 25deg, transparent 0 15%, rgba(25,201,255,.64) 15% 16%, transparent 16% 35%, rgba(255,118,0,.7) 35% 36%, transparent 36% 72%, rgba(25,201,255,.5) 72% 73%, transparent 73% 100%);
      mask: radial-gradient(circle, transparent 0 43%, #000 44% 46%, transparent 47% 54%, #000 55% 56%, transparent 57%);
      animation: rotate 18s linear infinite;
    }

    @keyframes rotate { to { transform: rotate(360deg); } }

    .marca-conteudo {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .marca-logo {
      display: block;
      width: clamp(30px, 2.55vw, 49px);
      height: clamp(38px, 3.15vw, 60px);
      object-fit: contain;
      object-position: center;
      filter:
        brightness(0) invert(1)
        drop-shadow(0 0 8px rgba(25, 201, 255, .42))
        drop-shadow(0 0 15px rgba(25, 201, 255, .16));
    }

    .marca-nome {
      margin-top: 2px;
      color: var(--white);
      font-size: clamp(17px, 1.45vw, 28px);
      font-weight: 950;
      letter-spacing: .07em;
    }

    .marca-sub {
      margin-top: 1px;
      color: var(--orange);
      font-size: clamp(8px, .6vw, 11px);
      font-weight: 850;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .total-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(0, 172, 255, .13), transparent 55%),
        linear-gradient(180deg, rgba(7, 27, 49, .98), rgba(2, 12, 23, .99));
    }

    .total-label {
      color: #76d7ff;
      font-size: clamp(10px, .94vw, 17px);
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .total-valor {
      color: var(--white);
      font-size: clamp(39px, 3.85vw, 73px);
      line-height: 1;
      font-weight: 720;
      letter-spacing: -.025em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 8px rgba(255,255,255,.22), 0 0 24px rgba(25,201,255,.21);
    }

    .total-linha {
      width: 73%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--orange), var(--cyan), transparent);
      box-shadow: 0 0 12px rgba(255,118,0,.3);
    }

    .total-info {
      color: var(--muted);
      font-size: clamp(8px, .57vw, 10px);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    @media (max-width: 1220px) {
      body { justify-content: flex-start; padding: 7px; }
      .shell { width: 1180px; min-width: 1180px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .live-dot, .hud-ring, .valor-integrante.loading { animation: none; }
      .semana-btn { transition: none; }
    }


    .developer-credit {
      position: fixed;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      z-index: 1000;
      color: rgba(120, 204, 235, .42);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .11em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 8px rgba(25, 201, 255, .14);
    }

    @media (max-width: 600px) {
      .developer-credit {
        bottom: 4px;
        font-size: 8px;
        letter-spacing: .08em;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <i class="decor-corner tl"></i>
    <i class="decor-corner tr"></i>
    <i class="decor-corner bl"></i>
    <i class="decor-corner br"></i>

    <div class="layout">
      <header class="topbar">
        <div class="titulo-bloco">
          <div class="eyebrow">Central de resultados</div>
          <h1 class="titulo-principal">Performance <b>Comercial</b></h1>
        </div>

        <nav class="semanas" aria-label="Selecionar período">
          <button class="semana-btn" type="button" data-filtro="semana" data-semana="1">1ª semana</button>
          <button class="semana-btn" type="button" data-filtro="semana" data-semana="2">2ª semana</button>
          <button class="semana-btn" type="button" data-filtro="semana" data-semana="3">3ª semana</button>
          <button class="semana-btn" type="button" data-filtro="semana" data-semana="4">4ª semana</button>
          <button class="semana-btn" type="button" data-filtro="mes">Mês</button>
        </nav>

        <div class="status-area">
          <div class="periodo-wrap">
            <div class="periodo" id="periodo">Carregando período</div>
            <div class="ultima-atualizacao" id="ultimaAtualizacao">Preparando painel...</div>
          </div>
          <div class="live-badge demo" id="liveBadge">
            <span class="live-dot"></span>
            <span id="liveTexto">Demonstração</span>
          </div>
        </div>
      </header>

      <section class="painel" id="painel" aria-live="polite"></section>
    </div>
  </main>

  <script>
    const CONFIG = {
      // Cole aqui a URL publicada do Web App do Apps Script.
      API_URL: "https://script.google.com/macros/s/AKfycbwQGo2Ipg9zfIKAaN5A1YtCZMIckRqQOkhB8BE7T3Uq4x8tDeve4Asz7WF3sRD2fit1/exec",

      // Atualização automática dos dados.
      INTERVALO_ATUALIZACAO_MS: 15000,

      // A página usa automaticamente o mês e o ano atuais.
      MES: new Date().getMonth() + 1,
      ANO: new Date().getFullYear()
    };

    const EQUIPES = [
      {
        id: "predadores",
        nome: "Predadores",
        logo: "assets/predadores.jpeg",
        metaPadrao: 36900,
        integrantes: [
          ["Gabriel Gorgonio", 11216],
          ["Maria Laura", 13522],
          ["Raíssa Fontoura", 7267],
          ["Rodolfo Henrique", 4285]
        ]
      },
      {
        id: "invictus",
        nome: "Invictus",
        logo: "assets/invictus.jpeg",
        metaPadrao: 32675,
        integrantes: [
          ["Giseli de Jesus", 12367],
          ["Ana Kelly", 3972],
          ["Leticia Pereira", 7454],
          ["Cadiane", 6893],
          ["Ana Luiza", 1814]
        ]
      },
      {
        id: "evolution",
        nome: "Evolution",
        logo: "assets/evolution.jpeg",
        metaPadrao: 33450,
        integrantes: [
          ["Cauê Galates", 6803],
          ["Daniela Moura", 5709],
          ["Gabrielle Carvalho", 9047],
          ["Kevin Cristovão", 10202]
        ]
      },
      {
        id: "vip",
        nome: "VIP",
        logo: "assets/vip.jpeg",
        metaPadrao: 38450,
        integrantes: [
          ["Alana Santos", 15734],
          ["Camilly Longhi", 8922],
          ["Jane menezes", 4449],
          ["Paola Fernandes", 8975]
        ]
      },
      {
        id: "winx",
        nome: "Winx",
        logo: "assets/winx.jpeg",
        metaPadrao: 29225,
        integrantes: [
          ["Letícia Vieira", 19199],
          ["Vinicius Ribeiro", 20142],
          ["Chrystian", 7739],
          ["Melissa Ferreira", 4387]
        ]
      },
      {
        id: "alfas",
        nome: "Alfas",
        logo: "assets/alfas.jpeg",
        metaPadrao: 36900,
        integrantes: [
          ["Nathália", 8230],
          ["Fabiana Godoy", 6104],
          ["Bruna Moraes", 4104],
          ["Gabrielle Andrade", 11509]
        ]
      },
      {
        id: "goat",
        nome: "Goat",
        logo: "assets/goat.jpeg",
        metaPadrao: 32675,
        integrantes: [
          ["Beatriz Cunha", 17006],
          ["Lara Baptista", 8984],
          ["Lucas Eduardo", 6484],
          ["Estephany", 5286]
        ]
      }
    ];

    const NOMES_MESES = [
      "janeiro", "fevereiro", "março", "abril", "maio", "junho",
      "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"
    ];

    const FAIXAS_SEMANA = {
      1: [1, 4],
      2: [6, 11],
      3: [13, 18],
      4: [20, 31]
    };

    const painel = document.getElementById("painel");
    const periodoEl = document.getElementById("periodo");
    const ultimaAtualizacaoEl = document.getElementById("ultimaAtualizacao");
    const liveBadge = document.getElementById("liveBadge");
    const liveTexto = document.getElementById("liveTexto");
    const botoesPeriodo = [...document.querySelectorAll(".semana-btn")];

    let modoAtivo = "semana";
    let semanaAtiva = Math.min(4, Math.max(1, Math.ceil(new Date().getDate() / 7)));
    let timerAtualizacao = null;
    let dadosAtuais = criarDadosDemonstracao();
    let metasAtuais = criarMetasDemonstracao();
    let carregando = false;
    let requisicaoAtual = 0;
    let periodoServidor = null;

    function normalizarNome(valor) {
      return String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatarMoeda(valor) {
      return `R$ ${Math.round(Number(valor) || 0).toLocaleString("pt-BR")}`;
    }

    function criarDadosDemonstracao() {
      const vendedores = {};
      EQUIPES.forEach(equipe => {
        equipe.integrantes.forEach(([nome, valor]) => {
          vendedores[normalizarNome(nome)] = valor;
        });
      });
      return vendedores;
    }

    function criarMetasDemonstracao() {
      return EQUIPES.reduce((metas, equipe) => {
        metas[equipe.id] = Number(equipe.metaPadrao) || 0;
        return metas;
      }, {});
    }

    function normalizarMetas(metasServidor) {
      const metas = criarMetasDemonstracao();

      Object.entries(metasServidor || {}).forEach(([equipeId, valor]) => {
        const chave = String(equipeId || "").trim().toLowerCase();
        if (!chave) return;
        metas[chave] = Number(valor) || 0;
      });

      return metas;
    }

    function metaEquipe(equipe) {
      return Number(metasAtuais[equipe.id]) || 0;
    }

    function normalizarMapaVendedores(vendedores, vendedoresLista = []) {
      const mapa = {};

      Object.entries(vendedores || {}).forEach(([nome, valor]) => {
        const chave = normalizarNome(nome);
        const numero = Number(valor) || 0;

        if (!chave) return;

        // O Apps Script pode retornar o mesmo vendedor com o nome
        // original e também normalizado. Mantém apenas um valor.
        mapa[chave] = Math.max(Number(mapa[chave] || 0), numero);
      });

      (Array.isArray(vendedoresLista) ? vendedoresLista : []).forEach(item => {
        const chave = normalizarNome(item?.nome || item?.chave);
        const numero = Number(item?.total) || 0;

        if (!chave) return;
        mapa[chave] = Math.max(Number(mapa[chave] || 0), numero);
      });

      return mapa;
    }

    function valorVendedor(nome) {
      return Number(dadosAtuais[normalizarNome(nome)] || 0);
    }

    function criarCardEquipe(equipe) {
      const realizado = equipe.integrantes.reduce((total, [nome]) => total + valorVendedor(nome), 0);
      const meta = metaEquipe(equipe);
      const percentual = meta > 0 ? Math.round((realizado / meta) * 100) : 0;

      const linhas = equipe.integrantes.map(([nome]) => `
        <div class="integrante">
          <span class="nome" title="${nome}">${nome}</span>
          <span class="valor-integrante" data-vendedor="${normalizarNome(nome)}">${formatarMoeda(valorVendedor(nome))}</span>
        </div>
      `).join("");

      return `
        <article class="card equipe-card" data-equipe="${equipe.id}" aria-label="Equipe ${equipe.nome}">
          <div class="equipe-topo">
            <div class="logo-frame">
              <img src="${equipe.logo}" alt="Logo da equipe ${equipe.nome}">
            </div>
            <div class="integrantes">${linhas}</div>
          </div>
          <div class="equipe-kpis">
            <div class="kpi">
              <span class="kpi-label">Meta</span>
              <strong class="kpi-valor meta">${formatarMoeda(meta)}</strong>
            </div>
            <div class="kpi">
              <span class="kpi-label">Realizado</span>
              <strong class="kpi-valor" data-realizado="${equipe.id}">${formatarMoeda(realizado)}</strong>
            </div>
            <div class="kpi">
              <span class="kpi-label">Pontuação</span>
              <strong class="percentual" data-percentual="${equipe.id}">${percentual}%</strong>
            </div>
          </div>
        </article>
      `;
    }

    function renderizarPainel() {
      const totalGeral = EQUIPES.reduce((total, equipe) => {
        return total + equipe.integrantes.reduce((soma, [nome]) => soma + valorVendedor(nome), 0);
      }, 0);

      painel.innerHTML = `
        ${EQUIPES.slice(0, 6).map(criarCardEquipe).join("")}
        ${criarCardEquipe(EQUIPES[6])}

        <section class="card marca-card" aria-label="Marca central">
          <div class="hud">
            <div class="hud-ring"></div>
            <div class="marca-conteudo">
              <img class="marca-logo" src="assets/unifahe-icon.png" alt="Símbolo da UNIFAHE">
              <strong class="marca-nome">UNIFAHE</strong>
              <span class="marca-sub">Faculdade a distância</span>
            </div>
          </div>
        </section>

        <section class="card total-card" aria-label="Total geral">
          <span class="total-label">Total geral</span>
          <strong class="total-valor" id="totalGeral">${formatarMoeda(totalGeral)}</strong>
          <span class="total-linha" aria-hidden="true"></span>
          <span class="total-info">${modoAtivo === "mes" ? "Somatório do mês • segunda a sábado" : "Somatório da semana selecionada"}</span>
        </section>
      `;
    }

    function atualizarCabecalho(periodo = periodoServidor) {
      let inicio;
      let fim;
      let mes = CONFIG.MES;
      let ano = CONFIG.ANO;

      if (periodo) {
        mes = Number(periodo.mes || mes);
        ano = Number(periodo.ano || ano);
      }

      const ultimoDia = new Date(ano, mes, 0).getDate();

      if (modoAtivo === "mes") {
        periodoEl.textContent = `Mês completo • segunda a sábado • ${NOMES_MESES[mes - 1]} de ${ano}`;
      } else {
        if (periodo && Number(periodo.inicio) && Number(periodo.fim)) {
          inicio = Number(periodo.inicio);
          fim = Number(periodo.fim);
        } else {
          const faixa = FAIXAS_SEMANA[semanaAtiva] || FAIXAS_SEMANA[1];
          inicio = faixa[0];
          fim = Math.min(faixa[1], ultimoDia);
        }

        periodoEl.textContent = `${inicio.toString().padStart(2, "0")} a ${fim.toString().padStart(2, "0")} de ${NOMES_MESES[mes - 1]} de ${ano}`;
      }

      botoesPeriodo.forEach(botao => {
        const filtro = botao.dataset.filtro || "semana";
        const ativa = filtro === "mes"
          ? modoAtivo === "mes"
          : modoAtivo === "semana" && Number(botao.dataset.semana) === semanaAtiva;

        botao.classList.toggle("active", ativa);
        botao.setAttribute("aria-pressed", String(ativa));
      });
    }

    function apiConfigurada() {
      return /^https:\/\/script\.google\.com\//i.test(CONFIG.API_URL);
    }

    function definirStatus(tipo, texto, detalhe) {
      liveBadge.classList.remove("demo", "error");
      if (tipo === "demo") liveBadge.classList.add("demo");
      if (tipo === "error") liveBadge.classList.add("error");
      liveTexto.textContent = texto;
      ultimaAtualizacaoEl.textContent = detalhe;
    }

    function marcarCarregamento(ativo) {
      document.querySelectorAll(".valor-integrante").forEach(el => el.classList.toggle("loading", ativo));
    }

    function carregarJsonp(url, { modo, semana }, timeoutMs = 12000) {
      return new Promise((resolve, reject) => {
        const callback = `painelCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const separador = url.includes("?") ? "&" : "?";
        const timeout = window.setTimeout(() => finalizar(new Error("Tempo limite excedido ao carregar os dados.")), timeoutMs);

        function finalizar(erro, dados) {
          window.clearTimeout(timeout);
          script.remove();
          try { delete window[callback]; } catch (_) { window[callback] = undefined; }
          erro ? reject(erro) : resolve(dados);
        }

        window[callback] = dados => finalizar(null, dados);
        script.onerror = () => finalizar(new Error("Não foi possível acessar o Apps Script."));

        const parametros = new URLSearchParams({
          rota: "equipes",
          callback,
          visao: modo,
          semana: String(semana),
          mes: String(CONFIG.MES),
          ano: String(CONFIG.ANO),
          _: String(Date.now())
        });

        script.src = `${url}${separador}${parametros.toString()}`;
        document.head.appendChild(script);
      });
    }

    async function atualizarDados({ silencioso = false } = {}) {
      const modoSolicitado = modoAtivo;
      const semanaSolicitada = semanaAtiva;
      const idRequisicao = ++requisicaoAtual;
      carregando = true;

      if (!apiConfigurada()) {
        dadosAtuais = criarDadosDemonstracao();
        metasAtuais = criarMetasDemonstracao();
        periodoServidor = null;
        renderizarPainel();
        atualizarCabecalho();
        definirStatus("demo", "Demonstração", "Configure a URL do Apps Script no index.html");
        carregando = false;
        return;
      }

      if (!silencioso) marcarCarregamento(true);
      const descricaoBusca = modoSolicitado === "mes"
        ? "Buscando o mês completo (segunda a sábado)..."
        : `Buscando dados da ${semanaSolicitada}ª semana...`;
      definirStatus("online", "Sincronizando", descricaoBusca);

      try {
        const resposta = await carregarJsonp(CONFIG.API_URL, {
          modo: modoSolicitado,
          semana: semanaSolicitada
        });
        const sucesso = resposta && (resposta.ok === true || resposta.sucesso === true);

        if (!sucesso || !resposta.vendedores) {
          throw new Error(resposta?.erro || resposta?.mensagem || "Resposta inválida do Apps Script.");
        }

        // Ignora respostas antigas caso o usuário troque o período durante a busca.
        if (
          idRequisicao !== requisicaoAtual ||
          modoSolicitado !== modoAtivo ||
          (modoSolicitado === "semana" && semanaSolicitada !== semanaAtiva)
        ) return;

        dadosAtuais = normalizarMapaVendedores(
          resposta.vendedores,
          resposta.vendedoresLista
        );
        metasAtuais = normalizarMetas(resposta.metas);
        periodoServidor = resposta.periodo || null;
        renderizarPainel();
        atualizarCabecalho(periodoServidor);

        const horario = new Date().toLocaleTimeString("pt-BR", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        const periodoStatus = modoSolicitado === "mes"
          ? "Mês completo • segunda a sábado"
          : `${semanaSolicitada}ª semana`;

        definirStatus(
          "online",
          "Ao vivo",
          `${periodoStatus} • atualizado às ${horario} • atualização automática a cada ${CONFIG.INTERVALO_ATUALIZACAO_MS / 1000}s`
        );
      } catch (erro) {
        if (idRequisicao !== requisicaoAtual) return;
        renderizarPainel();
        atualizarCabecalho();
        definirStatus("error", "Falha na conexão", erro.message || "Erro ao atualizar os dados.");
        console.error(erro);
      } finally {
        if (idRequisicao === requisicaoAtual) {
          carregando = false;
          marcarCarregamento(false);
        }
      }
    }

    function programarAtualizacao() {
      window.clearInterval(timerAtualizacao);
      timerAtualizacao = window.setInterval(() => atualizarDados({ silencioso: true }), CONFIG.INTERVALO_ATUALIZACAO_MS);
    }

    botoesPeriodo.forEach(botao => {
      botao.addEventListener("click", () => {
        const filtro = botao.dataset.filtro || "semana";

        if (filtro === "mes") {
          modoAtivo = "mes";
        } else {
          const novaSemana = Number(botao.dataset.semana);
          if (!novaSemana) return;
          modoAtivo = "semana";
          semanaAtiva = novaSemana;
        }

        periodoServidor = null;
        atualizarCabecalho();
        atualizarDados();
      });
    });

    atualizarCabecalho();
    renderizarPainel();
    atualizarDados();
    programarAtualizacao();
  </script>
